services:
  app:
    build: .
    container_name: saju-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: saju_app
      MYSQL_USER: saju_user
      MYSQL_PASSWORD: saju_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      APP_AI_PROVIDER: ${APP_AI_PROVIDER:-mock}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JWT_SECRET: change-this-local-secret-change-this-local-secret
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.4
    container_name: saju-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: saju_app
      MYSQL_USER: saju_user
      MYSQL_PASSWORD: saju_password
      MYSQL_ROOT_PASSWORD: root_password
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    container_name: saju-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
