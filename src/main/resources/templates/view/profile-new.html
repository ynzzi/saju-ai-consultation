<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 등록 | Saju AI</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header class="top-bar">
    <a class="brand-mark" href="/view/profiles">Saju AI</a>
    <nav class="top-actions">
        <a class="ghost-button" href="/view/profiles">목록</a>
        <button type="button" id="logoutButton" class="ghost-button">로그아웃</button>
    </nav>
</header>

<main class="page-shell narrow">
    <section class="panel">
            <div class="page-heading compact">
                <span class="eyebrow">New Profile</span>
                <h1>프로필 등록</h1>
                <p>생년월일과 출생시간을 입력하면 현재 입력값 기준의 사주 풀이가 생성됩니다.</p>
        </div>

        <form id="profileForm" class="form-stack">
            <label>
                프로필 이름
                <input type="text" id="profileName" maxlength="60" required>
            </label>
            <div class="form-row">
                <label>
                    생년월일
                    <input type="date" id="birthDate" required>
                </label>
                <label>
                    출생시간
                    <input type="time" id="birthTime" step="60" required>
                </label>
            </div>
            <div class="form-row">
                <label>
                    양력/음력
                    <select id="calendarType" required>
                        <option value="SOLAR">양력</option>
                        <option value="LUNAR">음력</option>
                    </select>
                </label>
                <label id="leapMonthField" class="checkbox-label" hidden>
                    <input type="checkbox" id="leapMonth">
                    음력 윤달
                </label>
                <label>
                    성별
                    <select id="gender" required>
                        <option value="FEMALE">여성</option>
                        <option value="MALE">남성</option>
                    </select>
                </label>
            </div>
            <p id="errorMessage" class="error-message" hidden></p>
            <div class="form-actions">
                <a class="ghost-button" href="/view/profiles">취소</a>
                <button type="submit" class="primary-button">등록</button>
            </div>
        </form>
    </section>
</main>
<script src="/js/api.js"></script>
<script src="/js/profile.js"></script>
</body>
</html>
