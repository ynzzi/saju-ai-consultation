<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 목록 | Saju AI</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header class="top-bar">
    <a class="brand-mark" href="/view/profiles">Saju AI</a>
    <nav class="top-actions">
        <a class="secondary-button" href="/view/profiles/new">새 프로필 등록</a>
        <button type="button" id="logoutButton" class="ghost-button">로그아웃</button>
    </nav>
</header>

<main class="page-shell">
    <section class="page-heading page-hero">
        <div>
            <span class="eyebrow">Profile Archive</span>
            <h1>내 사주 프로필 보관함</h1>
            <p>나와 가까운 사람들의 사주 프로필을 저장하고, 분석과 상담을 이어갈 수 있습니다.</p>
        </div>
        <a class="primary-button hero-action" href="/view/profiles/new">새 프로필 등록</a>
    </section>

    <p id="errorMessage" class="error-message" hidden></p>
    <section id="profilesContainer" class="profile-grid"></section>
    <section id="emptyState" class="empty-card" hidden>
        <span class="empty-icon">Saju AI</span>
        <h2>아직 등록된 사주 프로필이 없습니다.</h2>
        <p>첫 프로필을 등록하면 사주 풀이와 AI 상담을 바로 시작할 수 있습니다.</p>
        <a class="primary-button" href="/view/profiles/new">첫 프로필 등록하기</a>
    </section>
</main>
<script src="/js/api.js"></script>
<script src="/js/profile.js"></script>
</body>
</html>
