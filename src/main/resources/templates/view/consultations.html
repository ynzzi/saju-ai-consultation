<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 상담 | Saju AI</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header class="top-bar">
    <a class="brand-mark" href="/view/profiles">Saju AI</a>
    <nav class="top-actions">
        <a id="profileLink" class="ghost-button" href="/view/profiles">프로필 상세</a>
        <a class="ghost-button" href="/view/profiles">목록</a>
        <button type="button" id="logoutButton" class="ghost-button">로그아웃</button>
    </nav>
</header>

<main class="page-shell">
    <p id="errorMessage" class="error-message" hidden></p>

    <section class="consultation-layout">
        <aside class="panel consultation-profile">
            <div class="page-heading compact">
                <h1 id="profileName">AI 상담</h1>
            </div>
            <dl class="compact-meta-list">
                <div>
                    <dt>생년월일</dt>
                    <dd id="birthDate"></dd>
                </div>
                <div>
                    <dt>출생시간</dt>
                    <dd id="birthTime"></dd>
                </div>
                <div>
                    <dt>양력/음력</dt>
                    <dd id="calendarType"></dd>
                </div>
                <div>
                    <dt>성별</dt>
                    <dd id="gender"></dd>
                </div>
            </dl>
            <section class="analysis-section">
                <h3>기본 성향 요약</h3>
                <p id="analysisSummary"></p>
            </section>
            <section class="analysis-section recommended-section">
                <h3>추천 질문</h3>
                <div id="recommendedQuestions" class="question-chip-group"></div>
            </section>
        </aside>

        <section class="panel chat-panel">
            <div id="chatMessages" class="chat-messages"></div>

            <form id="consultationForm" class="chat-form">
                <label class="sr-only" for="question">질문</label>
                <textarea id="question" rows="3" maxlength="2000" placeholder="저에게 잘 맞는 직무는 무엇인가요?" required></textarea>
                <button type="submit" id="submitQuestionButton" class="primary-button">질문하기</button>
            </form>
        </section>
    </section>
</main>
<script src="/js/api.js"></script>
<script src="/js/consultation.js"></script>
</body>
</html>
