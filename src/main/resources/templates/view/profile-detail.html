<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 상세 | Saju AI</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header class="top-bar">
    <a class="brand-mark" href="/view/profiles">Saju AI</a>
    <nav class="top-actions">
        <a class="ghost-button" href="/view/profiles">목록</a>
        <button type="button" id="logoutButton" class="ghost-button">로그아웃</button>
    </nav>
</header>

<main class="page-shell">
    <p id="errorMessage" class="error-message" hidden></p>

    <section id="profileDetail" class="detail-layout" hidden>
        <article class="panel">
            <div class="page-heading compact">
                <h1 id="profileName"></h1>
            </div>
            <dl class="meta-list">
                <div>
                    <dt>생년월일</dt>
                    <dd id="birthDate"></dd>
                </div>
                <div>
                    <dt>출생시간</dt>
                    <dd id="birthTime"></dd>
                </div>
                <div>
                    <dt>양력/음력</dt>
                    <dd id="calendarType"></dd>
                </div>
                <div>
                    <dt>성별</dt>
                    <dd id="gender"></dd>
                </div>
                <div>
                    <dt>출생지역</dt>
                    <dd id="birthPlace"></dd>
                </div>
            </dl>
            <div class="button-row">
                <a class="secondary-button" href="/view/profiles">목록으로 돌아가기</a>
                <button type="button" id="deleteButton" class="danger-button">삭제</button>
            </div>
        </article>

        <article class="panel analysis-panel">
            <h2>기본 분석</h2>
            <section class="analysis-section">
                <h3>기본 성향 요약</h3>
                <p id="analysisSummary"></p>
            </section>
            <section class="analysis-section">
                <h3>오행 요약</h3>
                <p id="elementSummary"></p>
            </section>
            <section class="analysis-section">
                <h3>강점</h3>
                <ul id="strengths"></ul>
            </section>
            <section class="analysis-section">
                <h3>주의점</h3>
                <ul id="cautions"></ul>
            </section>
            <section class="analysis-section">
                <h3>추천 질문</h3>
                <ul id="recommendedQuestions"></ul>
            </section>
        </article>
    </section>
</main>
<script src="/js/api.js"></script>
<script src="/js/profile.js"></script>
</body>
</html>
