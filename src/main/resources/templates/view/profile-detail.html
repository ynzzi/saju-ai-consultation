<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 상세 | Saju AI</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<header class="top-bar">
    <a class="brand-mark" href="/view/profiles">Saju AI</a>
    <nav class="top-actions">
        <a class="ghost-button" href="/view/profiles">목록</a>
        <button type="button" id="logoutButton" class="ghost-button">로그아웃</button>
    </nav>
</header>

<main class="page-shell">
    <p id="errorMessage" class="error-message" hidden></p>
    <p id="successMessage" class="success-message" hidden></p>

    <section id="profileDetail" class="detail-layout" hidden>
        <article class="panel">
            <div class="page-heading compact">
                <h1 id="profileName"></h1>
            </div>
            <dl class="meta-list">
                <div>
                    <dt>생년월일</dt>
                    <dd id="birthDate"></dd>
                </div>
                <div>
                    <dt>출생시간</dt>
                    <dd id="birthTime"></dd>
                </div>
                <div>
                    <dt>양력/음력</dt>
                    <dd id="calendarType"></dd>
                </div>
                <div>
                    <dt>윤달 여부</dt>
                    <dd id="leapMonth"></dd>
                </div>
                <div>
                    <dt>성별</dt>
                    <dd id="gender"></dd>
                </div>
            </dl>
            <div class="button-row">
                <a id="consultationLink" class="primary-button" href="#">AI 상담하기</a>
                <button type="button" id="reanalyzeButton" class="secondary-button">분석 다시 생성</button>
                <a class="secondary-button" href="/view/profiles">목록으로 돌아가기</a>
                <button type="button" id="deleteButton" class="danger-button">삭제</button>
            </div>
        </article>

        <article class="panel fortune-reading-card">
            <div class="section-title">
                <h2>사주 풀이</h2>
            </div>
            <section class="reading-section pillar-section">
                <h3>사주팔자</h3>
                <dl class="pillar-grid">
                    <div>
                        <dt>년주</dt>
                        <dd id="yearPillar"></dd>
                    </div>
                    <div>
                        <dt>월주</dt>
                        <dd id="monthPillar"></dd>
                    </div>
                    <div>
                        <dt>일주</dt>
                        <dd id="dayPillar"></dd>
                    </div>
                    <div>
                        <dt>시주</dt>
                        <dd id="hourPillar"></dd>
                    </div>
                </dl>
            </section>

            <div class="reading-grid">
                <section class="reading-section element-section">
                    <h3>오행 분포</h3>
                    <ul id="fiveElementsSummary"></ul>
                </section>
                <section class="reading-section yinyang-section">
                    <h3>음양 분포</h3>
                    <ul id="yinYangSummary"></ul>
                </section>
            </div>

            <section class="reading-section interpretation-section">
                <h3>풀이 내용</h3>
                <div class="reading-copy">
                    <h4>성향 요약</h4>
                    <p id="analysisSummary"></p>
                    <h4>오행/에너지 조언</h4>
                    <p id="elementSummary"></p>
                </div>
                <div class="reading-grid">
                    <div>
                        <h4>강점</h4>
                        <ul id="strengths"></ul>
                    </div>
                    <div>
                        <h4>주의점</h4>
                        <ul id="cautions"></ul>
                    </div>
                </div>
            </section>

            <section class="reading-section question-section">
                <h3>추천 질문</h3>
                <div id="recommendedQuestions" class="question-chip-group"></div>
            </section>
        </article>
    </section>
</main>
<script src="/js/api.js"></script>
<script src="/js/profile.js"></script>
</body>
</html>
