spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

app:
  ai:
    provider: ${APP_AI_PROVIDER:${AI_PROVIDER:openai}}
    model: ${OPENAI_MODEL:gpt-5.5}

openai:
  api-key: ${OPENAI_API_KEY:}
